name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: build · test · clippy · fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  interop:
    name: interop vs @hocuspocus/provider 4.1.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: build example server
        run: cargo build --release -p hocuspocu-rs --example server
      - name: install JS clients
        working-directory: interop
        run: npm install --no-audit --no-fund
      - name: run server + multi-user interop
        working-directory: interop
        run: |
          HP_PORT=8088 ../target/release/examples/server &
          SERVER_PID=$!
          sleep 2
          HP_URL=ws://127.0.0.1:8088 HP_USERS=8 node multi_user_interop.mjs
          STATUS=$?
          kill $SERVER_PID || true
          exit $STATUS
